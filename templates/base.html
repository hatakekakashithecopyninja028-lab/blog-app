{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}The Margin — A Blog{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="{% url 'blog:post_list' %}" class="nav-brand">The Margin</a>
      <div class="nav-links">
        <a href="{% url 'blog:post_list' %}">Home</a>
        <a href="{% url 'blog:search' %}">Search</a>
        <a href="/admin/">Admin</a>
      </div>
    </div>
  </nav>

  {% if messages %}
  <div class="messages">
    {% for message in messages %}
    <div class="message message-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}

  <main>{% block content %}{% endblock %}</main>

  <footer>
    <div class="footer-inner">
      <span class="footer-brand">The Margin</span>
      <span class="footer-copy">A Django Blog — Built with care</span>
    </div>
  </footer>
</body>
</html>
